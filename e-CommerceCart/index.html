<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop - Modern E-commerce</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
 
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Shop</h1>
            <p>Discover our curated collection</p>
        </div>

        <div id="product-box">
            <h1>Products</h1>
            <ul id="All-products">
                <!-- Products will be generated by JavaScript -->
            </ul>
        </div>

        <div class="sidebar">
            <div class="cart-section">
                <h1>Your Cart</h1>
                <ul style="display: flex;gap: 20px;" id="checkout-list"></ul>
            </div>

            <div style="display: flex; flex-direction: column;" class="checkout-box">
                <span id="checkout-items">Total Items : </span>
                <span id="checkout-total">Total amount :  $0.00</span>
                <button id="checkout-btn" style="height: 30px; width: 100px;">Checkout</button>
            </div>
        </div>
    </div>

    <script src="script.js" >
    </script>
</body>

</html>

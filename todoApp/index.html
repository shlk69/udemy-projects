<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="todo-card">
            <h1 class="todo-title">My Tasks</h1>

            <div class="input-wrapper">
                <input type="text" class="task-input" placeholder="Write a new task..." aria-label="Task input">
                <button class="add-btn">Add Task</button>
            </div>

            <ul class="task-list">
                
            </ul>
        </div>
    </div>
</body>

</html>
